<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Ejemplos Prof. Ernesto Arbulú</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<!-- para el datatable -->
	<link rel="stylesheet" href="https://cdn.datatables.net/2.3.2/css/dataTables.bootstrap5.css">
	<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.datatables.net/2.3.2/js/dataTables.js"></script>
	<script src="https://cdn.datatables.net/2.3.2/js/dataTables.bootstrap5.js"></script>
</head>

<body>
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">
				<div class="row">
					<div class="col-md-10">
						<h1 class="card-title">Listado de productos</h1>
					</div>
					<div class="col-md-2">
						<a th:href="@{/producto/nuevo}" class="btn btn-success w-100"> <i class="fa-solid fa-plus"></i>
							Nuevo
						</a>
					</div>
				</div>
				<div class="row mb-3">
					<fieldset class="border border-2 border-dark pb-2">
						<legend class="float-none w-auto px-2">Filtros</legend>
						<form th:action="@{/producto/listado}" method="get" th:object="${filter}">
							<div class="row align-items-end">
								<div class="col-md-3">
									<label for="idCategoria" class="form-label">Categoría</label>
									<div class="input-group">
										<span class="input-group-text"><i
												class="fa-solid fa-chalkboard-user"></i></span>
										<select class="form-select" th:field="*{idCategoria}">
											<option value="">--Todos--</option>
											<option th:each="item: ${categorias}" th:value="${item.idCategoria}"
												th:text="${item.descripcion}"></option>
										</select>
									</div>
								</div>
								<div class="col-md-3">
									<label for="proveedor" class="form-label">Proveedor</label>
									<div class="input-group">
										<span class="input-group-text"><i class="fa-solid fa-truck-fast"></i></span>
										<select class="form-select" th:field="*{idProveedor}">
											<option value="">--Todos-- </option>
											<option th:each="item: ${proveedores}" th:value="${item.idProveedor}"
												th:text="${item.razonSocial}"></option>
										</select>
									</div>
								</div>
								<div class="col-md-6 text-end">
									<button type="submit" class="btn btn-outline-dark">
										<i class="fa-solid fa-binoculars"></i> Buscar
									</button>
									<a th:href="@{/producto/listado}" class="btn btn-outline-secondary">
										<i class="fa-solid fa-broom"></i> Limpiar
									</a>
								</div>
							</div>
						</form>
					</fieldset>
				</div>
				<table id="tbl-producto" class="table table-hover table-responsive">
					<thead class="table-dark text-center">
						<tr>
							<th>Id</th>
							<th>Descripción</th>
							<th>Stock</th>
							<th>Precio</th>
							<th>Categoría</th>
							<th>Proveedor</th>
							<th>Activo</th>
							<th>Acciones</th>
						</tr>
					</thead>
					<tbody class="table-secondary">
						<tr th:each="item: ${lstProductos}">
							<td th:text="${item.idProducto}" class="text-center"></td>
							<td th:text="${item.descripcion}"></td>
							<td th:text="${item.stock}" class="text-end"></td>
							<td th:text="|S/. ${#numbers.formatDecimal(item.precio, 1, 'COMMA', 2, 'POINT')}|"
								class="text-end"></td>
							<td th:text="${item.categoria.descripcion}"></td>
							<td th:text="${item.proveedor.razonSocial}"></td>
							<td>
								<span class="badge" th:classappend="(${item.activo}) ? 'bg-success' : 'bg-secondary'"
									th:text="${item.activoDescripcion}">
								</span>
							</td>
							<td class="text-center">
								<div class="d-flex justify-content-center align-items-center gap-2">
									<a th:href="@{/producto/edicion/{id}(id=${item.idProducto})}"
										class="btn btn-outline-primary" title="Editar" aria-label="Editar"
										role="button">
										<i class="fa-regular fa-pen-to-square"></i>
									</a>
									<form method="post" th:action="@{/producto/cambiar-estado}">
										<div class="form-switch">
											<input type="hidden" th:name="id" th:value="${item.idProducto}">
											<input class="form-check-input" type="checkbox" th:checked="${item.activo}"
												onchange="this.form.submit()">
										</div>
									</form>
								</div>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
	<th:block th:utext="${toast}"></th:block>
	<script>
		$(function () {
			$('#tbl-producto').DataTable({
				language: {
					search: 'Buscar (Descripción, Activo):',
					url: 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'
				},
				pageLength: 10,
				lengthMenu: [5, 10, 25, 50],
				ordering: true,
				order: [
					[0, 'desc']
				],
				responsive: true,
				columnDefs: [
					{targets: [4,5,6,7], orderable: false},
					{targets: [0,2,3,4,5,7], searchable: false}
				]
			});
		});
	</script>
</body>

</html>
