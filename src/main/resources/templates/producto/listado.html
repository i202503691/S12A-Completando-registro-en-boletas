<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Ejemplos Prof. Ernesto Arbulú</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">
				<div class="row">
					<div class="col-md-10">
						<h1 class="card-title">Listado de productos</h1>
					</div>
					<div class="col-md-2">
						<a th:href="@{/producto/nuevo}" class="btn btn-success w-100"> <i
							class="fa-solid fa-plus"></i> Nuevo
						</a>
					</div>
				</div>
				<table class="table table-hover table-responsive">
					<thead class="table-dark text-center">
						<tr>
							<th>Id</th>
							<th>Descripción</th>
							<th>Stock</th>
							<th>Precio</th>
							<th>Categoría</th>
							<th>Proveedor</th>
							<th>Activo</th>
							<th>Acciones</th>
						</tr>
					</thead>
					<tbody class="table-secondary">
						<tr th:each="item: ${lstProductos}">
							<td th:text="${item.idProducto}" class="text-center"></td>
							<td th:text="${item.descripcion}"></td>
							<td th:text="${item.stock}" class="text-end"></td>
							<td th:text="|S/. ${item.precio}|" class="text-end"></td>
							<td th:text="${item.categoria.descripcion}"></td>
							<td th:text="${item.proveedor.razonSocial}"></td>
							<td class="text-center">
								<span class="badge"
									th:classappend="(${item.activo}) ? ' bg-success' : ' bg-secondary'"
									th:text="(${item.activo}) ? 'activo' : 'inactivo'"> 
								</span>
							</td>
							<td class="text-center"></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
</body>









</html>
